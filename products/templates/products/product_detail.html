{% extends 'base.html' %}

{% block title %}
    {{ product.title }}
{% endblock %}

{% block content %}
<div class="detail-product">
    <h2>{{ product.title }}</h2>
    <div class="row">
        <div class="col">
            <img src="{{ product_img.image.url }}" alt="" class="img-thumbnail">
        </div>
        <div class="col">
            {{ product.description }}
        </div>
    </div>
    <h3> Price: <b style="color: red;">{{ product.price }}</b></h3>
    <a class="btn btn-primary" href="{% url 'update_cart' product.slug %}">Buy</a>
</div>
{% endblock %}
